project:
  title: "实训1"
  competition: "课程项目"
  question_count: 4

runtime:
  random_seed: 2026
  float_precision: 8
  fail_on_warning: false

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  external_data: data/external

plot:
  dpi: 300
  save_metadata: true
  require_figure_data: true

validation:
  sensitivity_relative_changes: [-0.20, -0.10, 0.10, 0.20]
  repeated_runs: 30
  confidence_level: 0.95

q3_optimal_control:
  assumption_source: "simulation_assumption_pending_sensitivity"
  fixed_range_m: 189781.310
  terminal_height_m: 10577.124
  terminal_airspeed_mps: 240.0
  mass_constraint: "terminal_only"
  bounds:
    h_min_m: 9000.0
    h_max_m: 12000.0
    v_min_mps: 210.0
    v_max_mps: 270.0
    mach_max: 0.84
    thrust_min_n: 0.0
    thrust_max_n: 90000.0
    gamma_max_rad: 0.05236
    thrust_rate_max_nps: 5000.0
    gamma_rate_max_radps: 0.002
    mass_min_kg: 62000.0
  direct_method:
    independent_variable: "distance"
    initial_nodes: 31
    refinement_nodes: [61, 121]
    transcription: "range-domain trapezoidal collocation before time-domain PMP diagnostics"
    control_rate_policy: "defer_strict_rate_constraints_to_extended-state_version"
    smoothing_regularization: "small squared adjacent-control differences for first implementation"
  feasibility_gate:
    nodes: 21
    objective: "minimize terminal mass slack before no-wind optimal solve"
    collocation_transcription: "trapezoidal"
    atmosphere_policy: "C1-smoothed transition near 11000 m required before full collocation or PMP/KKT diagnostics above 11000 m"
    atmosphere_smoothing_state: "temperature_only_hydrostatic_pressure"
    atmosphere_transition_band_m: [10950.0, 11050.0]
    hmax_sensitivity_m: [10950.0, 11500.0, 12000.0, 12500.0]
    slack_smoothing_tolerance_kg: 1.0e-3
    midpoint_constraint_check: "linear_midpoint_plus_post_reconstruction"
    lexicographic_second_stage_mass_policy: "enforce_terminal_mass_with_numeric_tolerance"
    reintegration_diagnostics:
      - reintegration_state_error_inf
      - reintegration_terminal_mass_error_kg
      - reintegration_terminal_height_error_m
      - reintegration_terminal_speed_error_mps
    pass_criteria:
      terminal_mass_shortfall_kg: 0.05
      scaled_collocation_defect_inf: 1.0e-6
      terminal_height_error_m: 0.1
      terminal_airspeed_error_mps: 1.0e-3
      constraint_violation_tolerance: 1.0e-6
      constraint_violation_scale: "nondimensional"
    smoothing_policy: "lexicographic: first minimize mass slack, then fix slack tolerance and smooth controls"
    time_limit_factors: [1.05, 1.10]
    idle_thrust_sensitivity_fractions: [0.0, 0.05, 0.10]
